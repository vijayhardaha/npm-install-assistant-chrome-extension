name: CI

on:
  push:
    branches:
      - "master"
    paths:
      - "src/**"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "package.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint scripts
        run: bun run lint

      - name: Lint styles
        run: bun run stylelint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: bun run tsc

      - name: Run tests
        run: bun run test
