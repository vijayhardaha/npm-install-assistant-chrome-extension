name: Build Extension

on:
  push:
    branches:
      - "master"
    paths:
      - "src/**"
      - "vite.config.ts"
      - "package.json"
      - "bun.lockb"
    tags:
      - "v*"
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint scripts
        run: bun run lint

      - name: Lint styles
        run: bun run stylelint

      - name: Format check
        run: bun run format:check

  build:
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build extension
        run: bun run build

      - name: Zip dist contents
        run: |
          cd dist
          zip -r ../npm-install-assistant.zip .

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-assistant
          path: npm-install-assistant.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: npm-install-assistant.zip
